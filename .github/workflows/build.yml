name: Multi‑Platform Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

          # Install local DBF package ONLY on Windows
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pip install ./libs/dbf
          fi

          pip install --no-cache-dir pyinstaller

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pyinstaller --noconfirm --windowed --onefile converter_gui_pro.py
          fi

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            pyinstaller --noconfirm --windowed --name "MyApp" converter_gui_pro.py
          fi

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            pyinstaller --noconfirm --onefile converter_gui_pro.py
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
